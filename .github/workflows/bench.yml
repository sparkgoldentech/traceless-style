name: benchmarks

# Strategy:
#   - On every PR that touches the compiler / runtime / bench code, run the
#     benchmark suite at a CI-sized scale (5K files, faster than the local
#     10K default) and POST the results as a sticky PR comment.
#   - On pushes to main, run the same suite and store the result as a
#     workflow artifact named `bench-baseline`. PRs fetch this artifact to
#     render a side-by-side comparison so reviewers can see perf deltas at
#     a glance.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "bench/**"
      - ".github/workflows/bench.yml"
      - "package.json"
      - "tsconfig.json"
  pull_request:
    paths:
      - "src/**"
      - "bench/**"
      - ".github/workflows/bench.yml"
      - "package.json"
      - "tsconfig.json"

# Each pushed commit on a branch supersedes the previous run.
concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# `pull-requests: write` — required for posting / updating the comment.
permissions:
  contents:        read
  pull-requests:   write
  actions:         read

jobs:
  bench:
    name: run scale benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Smaller scale than the 10K default — CI runners are weaker than
      # dev hardware, and we want sub-2-minute total job time.
      BENCH_FILES: "5000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: build library
        run: npm run build

      - name: run benchmarks
        run: node bench/run-all.mjs

      # ── Save current results, regardless of trigger ─────────────────────
      - name: upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('bench-pr-{0}', github.event.number) || 'bench-baseline' }}
          path: bench/RESULTS.md
          retention-days: 90

      # ── PR-only: fetch main baseline and post comparison comment ───────
      - name: download main-branch baseline (if available)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: bench.yml
          name: bench-baseline
          path: bench/baseline
          # Most recent successful run from main.
          branch: main
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: post results comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const MARKER = "<!-- traceless-style-bench -->";

            const current = fs.readFileSync("bench/RESULTS.md", "utf8");

            // Optional baseline.
            let baseline = null;
            const baselinePath = path.join("bench", "baseline", "RESULTS.md");
            try { baseline = fs.readFileSync(baselinePath, "utf8"); } catch {}

            const body = [
              MARKER,
              "## 📊 Scale benchmark results",
              "",
              baseline
                ? "Comparison against `main` baseline:"
                : "_No `main` baseline found — this is the first run. Future PRs will show a diff._",
              "",
              "<details><summary><strong>This PR</strong></summary>",
              "",
              current,
              "",
              "</details>",
              baseline ? "\n<details><summary><strong>main baseline</strong></summary>\n\n" + baseline + "\n\n</details>" : "",
              "",
              "_Scale: " + (process.env.BENCH_FILES || "?") + " files. Re-run locally with `npm run bench`._",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing benchmark comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info("Created new benchmark comment");
            }
