name: publish to npm

# Triggers on a `v*` tag push (e.g. `git tag v3.0.1 && git push --tags`).
# Also exposes a manual `workflow_dispatch` button on the Actions tab so
# we can re-run a publish without re-tagging if a transient failure hits.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + test + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # `id-token: write` enables npm provenance — the published
      # package gets a signed attestation linking it back to this
      # exact GitHub Actions run, visible on the npm page.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: install dependencies
        run: npm ci

      # `prepublishOnly` already runs build + test, but running them
      # explicitly here gives us cleaner CI logs and lets the workflow
      # fail at the build step rather than mid-publish.
      - name: build
        run: npm run build

      - name: test
        run: npm test

      - name: publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
