name: extension CI

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/extension.yml"
  pull_request:
    paths:
      - "extension/**"
      - ".github/workflows/extension.yml"

# Only run the latest commit per branch — older runs are cancelled when a
# new push lands. Keeps the queue moving + cuts CI minutes.
concurrency:
  group: extension-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: install dependencies
        run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: test
        run: npx tsx --test 'src/**/*.test.ts'

      - name: build
        run: npm run build

      - name: package (.vsix)
        run: npx --yes @vscode/vsce package --no-dependencies --out traceless-style.vsix

      - name: upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: traceless-style-vsix
          path: extension/traceless-style.vsix
          retention-days: 14
